<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai League Who Are Ya? - 2024/25</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 70%);
        }
        .correct { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); border-color: #22c55e; }
        .incorrect { background: linear-gradient(135deg, #334155 0%, #1e293b 100%); border-color: #475569; }
        
        .glow-text { text-shadow: 0 0 20px rgba(234, 179, 8, 0.4); }
        .search-item:hover { background-color: rgba(30, 41, 59, 0.8); }
        
        .guess-animate {
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .loading-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-8 md:my-12">
        <div id="playerCountBadge" class="inline-block px-4 py-1 bg-red-600 text-white text-[11px] font-bold rounded-full mb-3 tracking-[0.2em] uppercase shadow-lg shadow-red-900/20">
            กำลังโหลดข้อมูล...
        </div>
        <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter glow-text leading-tight text-center">
            <span class="text-yellow-400 uppercase">Thai League</span><br>
            <span class="text-white uppercase">Who Are Ya?</span>
        </h1>
    </header>

    <main class="w-full max-w-2xl">
        <div class="relative mb-10 group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 via-yellow-500 to-red-600 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-1000"></div>
            <input type="text" id="playerInput" autocomplete="off" disabled placeholder="กรุณารอสักครู่ กำลังโหลดข้อมูลนักเตะ..." 
                class="relative w-full p-6 rounded-2xl bg-slate-900/90 border border-slate-700 focus:border-yellow-500 outline-none transition-all text-xl text-white placeholder-slate-500 shadow-2xl backdrop-blur-md disabled:opacity-50 disabled:cursor-not-allowed">
            
            <div id="searchResults" class="absolute w-full mt-3 bg-slate-900 rounded-2xl shadow-2xl z-[100] max-h-[400px] overflow-y-auto hidden border border-slate-700 divide-y divide-slate-800">
            </div>
        </div>

        <div class="grid grid-cols-6 gap-2 mb-4 px-2 text-center text-[9px] sm:text-[11px] font-black text-slate-500 uppercase tracking-widest">
            <div>รูปภาพ</div>
            <div>ชื่อ</div>
            <div>สโมสร</div>
            <div>ตำแหน่ง</div>
            <div>ชาติ</div>
            <div>อายุ</div>
        </div>

        <div id="guessesContainer" class="space-y-3 pb-32"></div>
    </main>

    <!-- Modal เมื่อจบเกม -->
    <div id="modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md flex items-center justify-center hidden z-[200] p-4">
        <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 max-w-sm w-full text-center shadow-2xl transform transition-all" id="modalContent">
            <div id="resultEmoji" class="text-7xl mb-4">🏆</div>
            <h2 id="modalTitle" class="text-4xl font-black mb-2 italic"></h2>
            <p id="modalMessage" class="text-slate-400 mb-6 font-light"></p>
            
            <div id="targetReveal" class="mb-8 p-6 bg-slate-800/40 rounded-3xl border border-slate-700/50 relative overflow-hidden group">
                <img id="revealImage" src="" alt="Player" class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-yellow-500 object-cover shadow-2xl transition-transform group-hover:scale-110 duration-500">
                <div id="revealName" class="text-3xl font-black text-white mb-1"></div>
                <div id="revealDetails" class="text-slate-400 font-medium text-sm"></div>
            </div>

            <button onclick="resetGame()" class="w-full py-5 bg-gradient-to-r from-yellow-400 to-yellow-600 text-slate-950 hover:from-yellow-300 hover:to-yellow-500 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-[0_10px_40px_rgba(234,179,8,0.3)] uppercase">
                เล่นอีกครั้ง
            </button>
        </div>
    </div>

    <script>
        const API_URL = 'https://rawcdn.githack.com/pattararuek/football/refs/heads/main/thaileague_all_players.json';
        let allPlayers = [];
        let targetPlayer;
        let guesses = [];
        let isGameOver = false;

        const input = document.getElementById('playerInput');
        const resultsBox = document.getElementById('searchResults');
        const container = document.getElementById('guessesContainer');
        const modal = document.getElementById('modal');
        const badge = document.getElementById('playerCountBadge');

        // ฟังก์ชันดึงข้อมูลจาก API พร้อม Exponential Backoff
        async function fetchWithRetry(url, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Network response was not ok');
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        async function loadData() {
            try {
                const rawData = await fetchWithRetry(API_URL);
                
                // แปลงข้อมูลให้เป็น Format ที่ต้องการ
                allPlayers = rawData.map(p => ({
                    name: p.full_name || `${p.first_name} ${p.last_name}`,
                    team: p.club_name,
                    pos: p.position_short_name || "??",
                    nat: p.nationality ? p.nationality.code : "TH",
                    age: p.age,
                    img: p.tnm_photo || "https://placehold.co/150x150/1e293b/white?text=No+Photo"
                }));

                badge.innerText = `Database: ${allPlayers.length} Players`;
                badge.classList.replace('bg-red-600', 'bg-green-600');
                
                input.disabled = false;
                input.placeholder = "พิมพ์ชื่อนักเตะ หรือชื่อสโมสร...";
                
                initGame();
            } catch (error) {
                console.error("Failed to load players:", error);
                badge.innerText = "Error: ไม่สามารถโหลดข้อมูลได้";
                input.placeholder = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
            }
        }

        function initGame() {
            if (allPlayers.length === 0) return;
            
            targetPlayer = allPlayers[Math.floor(Math.random() * allPlayers.length)];
            guesses = [];
            isGameOver = false;
            
            input.disabled = false;
            input.value = '';
            container.innerHTML = '';
            modal.classList.add('hidden');
            resultsBox.classList.add('hidden');
            
            console.log("Dev Hint: " + targetPlayer.name);
            input.focus();
        }

        input.addEventListener('input', (e) => {
            if (isGameOver) return;
            const val = e.target.value.toLowerCase().trim();
            
            if (val.length < 1) {
                resultsBox.classList.add('hidden');
                return;
            }

            const filtered = allPlayers.filter(p => 
                (p.name.toLowerCase().includes(val) || p.team.toLowerCase().includes(val)) &&
                !guesses.some(g => g.name === p.name)
            ).slice(0, 10);

            if (filtered.length > 0) {
                resultsBox.innerHTML = filtered.map(p => `
                    <div onclick="selectPlayer('${p.name.replace(/'/g, "\\'")}')" class="p-4 search-item cursor-pointer flex justify-between items-center transition-all border-b border-slate-800 last:border-0">
                        <div class="flex items-center gap-4">
                            <img src="${p.img}" class="w-12 h-12 rounded-full object-cover border-2 border-slate-700 shadow-md" onerror="this.src='https://placehold.co/100x100/1e293b/white?text=?'">
                            <div class="flex flex-col text-left">
                                <span class="font-bold text-white text-lg leading-tight">${p.name}</span>
                                <span class="text-[10px] text-slate-400 uppercase font-medium tracking-wide">${p.team}</span>
                            </div>
                        </div>
                        <div class="px-3 py-1 bg-slate-800 rounded-lg text-[10px] font-black text-yellow-500 border border-slate-700">${p.pos}</div>
                    </div>
                `).join('');
                resultsBox.classList.remove('hidden');
            } else {
                resultsBox.classList.add('hidden');
            }
        });

        function selectPlayer(name) {
            const player = allPlayers.find(p => p.name === name);
            if (!player || isGameOver) return;
            
            input.value = '';
            resultsBox.classList.add('hidden');
            guesses.push(player);
            renderGuess(player);

            if (player.name === targetPlayer.name) {
                setTimeout(() => endGame(true), 1200);
            } else if (guesses.length >= 8) {
                setTimeout(() => endGame(false), 1200);
            }
        }

        function renderGuess(p) {
            const row = document.createElement('div');
            row.className = 'grid grid-cols-6 gap-1 sm:gap-2 px-1 guess-animate';
            
            const checks = [
                { type: 'img', val: p.img, correct: p.name === targetPlayer.name },
                { type: 'text', val: p.name, correct: p.name === targetPlayer.name },
                { type: 'text', val: p.team, correct: p.team === targetPlayer.team },
                { type: 'text', val: p.pos, correct: p.pos === targetPlayer.pos },
                { type: 'text', val: p.nat, correct: p.nat === targetPlayer.nat },
                { 
                    type: 'text', 
                    val: p.age, 
                    correct: p.age === targetPlayer.age, 
                    sub: p.age < targetPlayer.age ? '↑' : p.age > targetPlayer.age ? '↓' : '' 
                }
            ];

            row.innerHTML = checks.map((check, i) => {
                const bgClass = check.correct ? 'correct' : 'incorrect';
                const delay = i * 120;

                return `
                    <div style="animation-delay: ${delay}ms" class="h-20 sm:h-28 flex flex-col items-center justify-center rounded-xl text-[8px] sm:text-[10px] font-bold text-center border-2 shadow-lg transition-all duration-700 ${bgClass}">
                        ${check.type === 'img' ? 
                            `<img src="${check.val}" class="w-10 h-10 sm:w-14 sm:h-14 rounded-full object-cover border-2 border-white/20" onerror="this.src='https://placehold.co/100x100/1e293b/white?text=?'">` : 
                            `<span class="px-1 break-words line-clamp-3 uppercase">${check.val}</span>`
                        }
                        ${check.sub ? `<span class="text-lg leading-none mt-1 text-white/50 font-black">${check.sub}</span>` : ''}
                    </div>
                `;
            }).join('');

            container.prepend(row);
        }

        function endGame(won) {
            isGameOver = true;
            input.disabled = true;
            
            const revealImage = document.getElementById('revealImage');
            const revealName = document.getElementById('revealName');
            const revealDetails = document.getElementById('revealDetails');

            if (won) {
                document.getElementById('resultEmoji').innerText = "🏆";
                document.getElementById('modalTitle').innerText = "ทายถูกต้อง!";
                document.getElementById('modalTitle').className = "text-4xl font-black mb-2 text-green-400 italic";
                document.getElementById('modalMessage').innerText = `คุณเก่งมาก! ทายถูกใน ${guesses.length} ครั้ง`;
            } else {
                document.getElementById('resultEmoji').innerText = "💀";
                document.getElementById('modalTitle').innerText = "เกือบแล้ว!";
                document.getElementById('modalTitle').className = "text-4xl font-black mb-2 text-red-500 italic";
                document.getElementById('modalMessage').innerText = "เสียใจด้วย นักเตะที่ถูกต้องคือ...";
            }

            revealImage.src = targetPlayer.img;
            revealName.innerText = targetPlayer.name;
            revealDetails.innerText = `${targetPlayer.team} | ${targetPlayer.pos} | ${targetPlayer.nat} | อายุ ${targetPlayer.age}`;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function resetGame() {
            initGame();
        }

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !resultsBox.contains(e.target)) {
                resultsBox.classList.add('hidden');
            }
        });

        // เริ่มโหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = loadData;
    </script>
</body>
</html>
